<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - プロフィール</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.8.0-β</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li><a href="board.html">掲示板</a></li>
          <li><a href="calendar.html">カレンダー</a></li>
          <li><a href="timetable.html">時間割</a></li>
          <li class="active"><a href="profile.html">プロフィール</a></li>
          <li><a href="feedback.html">ご意見箱</a></li>
          <li><a href="game.html">ゲーム関連</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
      <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>プロフィール</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">
        <div class="profile-box">
          <h3>アカウント情報</h3>
          <div class="avatar-section">
            <div class="avatar-preview" id="avatar-preview">
              <span id="avatar-initial"></span>
              <img id="avatar-img" src="" alt="" style="display:none;">
            </div>
            <div class="avatar-actions">
              <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/gif,image/heic,image/heif" style="display:none;">
              <button id="avatar-upload-btn" class="btn-secondary">画像を変更</button>
              <button id="avatar-delete-btn" class="btn-danger" style="display:none;">削除</button>
            </div>
            <p id="avatar-msg"></p>
          </div>
          <div class="profile-item">
            <span class="profile-label">ユーザー名</span>
            <span id="profile-username">---</span>
          </div>
          <div class="profile-item">
            <span class="profile-label">固有ID</span>
            <span id="profile-user-id" style="color:var(--text-2);font-family:monospace;">---</span>
          </div>
          <div class="profile-item">
            <span class="profile-label">権限</span>
            <span id="profile-role">---</span>
          </div>
          <div class="profile-item">
            <span class="profile-label">作成日</span>
            <span id="profile-created">---</span>
          </div>
        </div>
        <div class="profile-box">
          <h3>パスワード変更</h3>
          <input type="password" id="current-password" placeholder="現在のパスワード">
          <input type="password" id="new-password" placeholder="新しいパスワード">
          <input type="password" id="confirm-password" placeholder="新しいパスワード（確認）">
          <button id="change-password-btn" class="btn-primary">変更する</button>
          <p id="password-msg"></p>
        </div>
        <!-- 自己紹介文 -->
        <div class="profile-box">
          <h3>✏️ 自己紹介</h3>
          <textarea id="bio-input" placeholder="自己紹介文を入力（200文字以内）" maxlength="200" rows="3" style="width:100%;background:var(--bg-sub);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:10px 14px;font-size:14px;font-family:inherit;resize:vertical;outline:none;"></textarea>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span id="bio-count" style="font-size:11px;color:var(--text-3);">0 / 200</span>
          </div>
        </div>

        <!-- 称号・バッジ装備 -->
        <div class="profile-box">
          <h3>🏅 称号・バッジ装備</h3>
          <p style="font-size:12px;color:var(--text-2);margin-bottom:12px;">ガチャで獲得した称号・バッジを装備できます。称号は1つ、バッジは最大3つまで。</p>

          <div class="equip-section">
            <div class="equip-label">👑 称号（1つ選択）</div>
            <div id="title-list" class="equip-grid"></div>
          </div>

          <div class="equip-section" style="margin-top:16px;">
            <div class="equip-label">🏅 バッジ（最大3つ選択）</div>
            <div id="badge-list" class="equip-grid"></div>
          </div>

          <div class="equip-preview" id="equip-preview"></div>

          <button class="btn-primary" id="save-profile-btn" style="width:100%;margin-top:12px;">プロフィールを保存</button>
          <p id="profile-save-msg" style="font-size:12px;min-height:16px;text-align:center;margin-top:4px;"></p>
        </div>

        <div class="profile-box danger-box">
          <h3>アカウント削除</h3>
          <p class="danger-text">この操作は取り消せません。アカウントと全データが削除されます。</p>
          <button id="delete-account-btn" class="btn-danger-lg">アカウントを削除する</button>
        </div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/profile.js?v=3"></script>
</body>
</html>
