<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - カレンダー</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div id="page-spinner"><div class="spinner-ring"></div><p class="spinner-text">読み込み中...</p></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.9.5-β</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li><a href="board.html">掲示板</a></li>
          <li class="active"><a href="calendar.html">カレンダー</a></li>
          <li><a href="timetable.html">時間割</a></li>
                    <li><a href="tasks.html">課題管理</a></li>
          <li><a href="grades.html">成績管理</a></li>
          <li><a href="game.html">ゲーム関連</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li><a href="feedback.html">ご意見箱</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
        <button id="pwa-install-btn">📲 アプリをインストール</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>カレンダー</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area cal-layout">

        <div class="cal-left">
          <div class="cal-header">
            <button class="cal-nav-btn" id="prev-month">‹</button>
            <span class="cal-month-label" id="month-label"></span>
            <button class="cal-nav-btn" id="next-month">›</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
          <div class="cal-legend">
            <span class="legend-item"><span class="legend-dot type-memo"></span>メモ</span>
            <span class="legend-item"><span class="legend-dot type-schedule"></span>予定</span>
            <span class="legend-item"><span class="legend-dot type-exam"></span>試験</span>
            <span class="legend-item"><span class="legend-dot type-deadline"></span>締め切り</span>
            <span class="legend-item"><span class="legend-dot type-event"></span>イベント</span>
          </div>
        </div>

        <div class="cal-right">
          <div class="xp-card" id="xp-card">
            <div class="xp-header">
              <span class="xp-level" id="xp-level">Lv.1</span>
              <span class="xp-streak" id="xp-streak">0日</span>
            </div>
            <div class="xp-bar-wrap">
              <div class="xp-bar" id="xp-bar" style="width:0%"></div>
            </div>
            <div class="xp-label" id="xp-label">0 / 100 XP</div>
          </div>

          <div class="exam-countdown" id="exam-countdown"></div>

          <div class="today-events">
            <h4 class="section-label" id="selected-date-label">今日の予定</h4>
            <div id="event-list"></div>
            <button class="btn-primary cal-add-btn" id="add-event-btn">＋ 追加</button>
          </div>
        </div>

      </section>
    </main>
  </div>

  <div id="event-modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modal-title">イベントを追加</h3>
      <input type="text" id="ev-title" placeholder="タイトル（必須）" maxlength="50">
      <select id="ev-type">
        <option value="memo">メモ・日記</option>
        <option value="schedule">予定</option>
        <option value="exam">試験</option>
        <option value="deadline">締め切り</option>
        <option value="event">イベント</option>
      </select>
      <input type="date" id="ev-date">
      <textarea id="ev-memo" placeholder="メモ（任意）" rows="3"></textarea>
      <div class="modal-buttons">
        <button id="ev-save-btn" class="btn-primary">保存</button>
        <button id="ev-cancel-btn" class="btn-secondary">キャンセル</button>
        <button id="ev-delete-btn" class="btn-danger" style="display:none;">削除</button>
      </div>
      <p id="ev-msg" style="font-size:12px;min-height:16px;color:var(--red);"></p>
    </div>
  </div>

  <div id="remind-modal" class="modal hidden">
    <div class="modal-box">
      <h3>本日・明日の予定</h3>
      <div id="remind-list"></div>
      <div class="modal-buttons">
        <button id="remind-close-btn" class="btn-primary">確認</button>
      </div>
    </div>
  </div>

  <script src="js/api.js?v=17"></script>
  <script src="js/auth.js?v=17"></script>
  <script src="js/calendar.js?v=17"></script>
  <nav class="bottom-nav">
    <a href="home.html"><span>🏠</span><span>ホーム</span></a>
    <a href="board.html"><span>📋</span><span>掲示板</span></a>
    <a href="calendar.html"><span>📅</span><span>カレンダー</span></a>
    <a href="tasks.html"><span>✅</span><span>課題</span></a>
    <a href="profile.html"><span>👤</span><span>プロフィール</span></a>
  </nav>
</body>
</html>
