<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b6ef5">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - ご意見箱</title>
  <link rel="stylesheet" href="css/style.css?v=20">
  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';</script>

  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div id="page-spinner"><div class="spinner-ring"></div><p class="spinner-text">読み込み中...</p></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.9.6-β</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li><a href="board.html">掲示板</a></li>
          <li><a href="calendar.html">カレンダー</a></li>
          <li><a href="study.html">学習</a></li>
          <li><a href="game.html">Pクエスト</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li  class="active"><a href="feedback.html">ご意見箱</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
        <button id="pwa-install-btn">📲 アプリをインストール</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>ご意見箱</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">

        <div class="fb-form-card">
          <h4 class="fb-form-title">意見・要望・バグ報告を送る</h4>
          <select id="fb-type">
            <option value="idea">改善案・アイデア</option>
            <option value="bug">バグ報告</option>
            <option value="request">機能リクエスト</option>
            <option value="other">その他</option>
          </select>
          <input type="text" id="fb-title" placeholder="タイトル（50文字以内）" maxlength="50">
          <textarea id="fb-content" placeholder="内容（500文字以内）" rows="4" maxlength="500"></textarea>
          <div id="fb-content-count" class="char-count">0 / 500</div>
          <label class="fb-anon-label">
            <input type="checkbox" id="fb-anonymous">
            <span>匿名で送信する</span>
          </label>
          <button class="btn-primary" id="fb-submit-btn">送信する</button>
          <p id="fb-msg" style="font-size:13px;min-height:16px;"></p>
        </div>

        <div class="fb-mine-section">
          <h4 class="fb-section-title">送信履歴</h4>
          <div id="fb-mine-list"></div>
        </div>

      </section>
    </main>
  </div>
  <script src="js/api.js?v=20"></script>
  <script src="js/auth.js?v=20"></script>
  <script src="js/feedback.js?v=20"></script>
    <nav class="bottom-nav">
    <a href="home.html"><span>ホーム</span></a>
    <a href="board.html"><span>掲示板</span></a>
    <a href="calendar.html"><span>カレンダー</span></a>
    <a href="study.html"><span>学習</span></a>
    <a href="profile.html"><span>プロフィール</span></a>
  </nav>
</body>
</html>
