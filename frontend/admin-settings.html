<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - 設定</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title"><a href="dashboard.html">Polonix</a><span class="sidebar-version">v0.3.0-beta</span></div>
      <nav>
        <ul>
          <li><a href="dashboard.html">ダッシュボード</a></li>
          <li><a href="users.html">ユーザー管理</a></li>
          <li><a href="notices.html">お知らせ管理</a></li>
          <li><a href="logs.html">ログ確認</a></li>
          <li class="active"><a href="admin-settings.html">設定</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <h2>設定</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">
        <div class="profile-box">
          <h3>アカウント情報</h3>
          <div class="profile-item">
            <span class="profile-label">ユーザー名</span>
            <span id="profile-username">---</span>
          </div>
          <div class="profile-item">
            <span class="profile-label">権限</span>
            <span id="profile-role">---</span>
          </div>
          <div class="profile-item">
            <span class="profile-label">作成日</span>
            <span id="profile-created">---</span>
          </div>
        </div>
        <div class="profile-box">
          <h3>パスワード変更</h3>
          <input type="password" id="current-password" placeholder="現在のパスワード">
          <input type="password" id="new-password" placeholder="新しいパスワード">
          <input type="password" id="confirm-password" placeholder="新しいパスワード（確認）">
          <button id="change-password-btn" class="btn-primary">変更する</button>
          <p id="password-msg"></p>
        </div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/admin-settings.js"></script>
</body>
</html>
