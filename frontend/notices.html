<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - お知らせ管理</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="page-spinner"><div class="spinner-ring"></div><p class="spinner-text">読み込み中...</p></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="dashboard.html">Polonix</a><span class="sidebar-version">v0.9.5-β</span></div>
      <nav>
        <ul>
          <li><a href="dashboard.html">ダッシュボード</a></li>
          <li><a href="users.html">ユーザー管理</a></li>
          <li class="active"><a href="notices.html">お知らせ管理</a></li>
          <li><a href="logs.html">ログ確認</a></li>
          <li><a href="feedback-admin.html">ご意見箱</a></li>
          <li><a href="xp-admin.html">XP管理</a></li>
          <li><a href="admin-settings.html">設定</a></li>
          <li style="border-top:1px solid var(--border);margin:6px 0;list-style:none;"></li>
          <li><a href="404.html">404ページ確認</a></li>
          <li><a href="500.html">500ページ確認</a></li>
          <li><a href="offline.html">オフラインページ確認</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
        <button id="pwa-install-btn">📲 アプリをインストール</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
      <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>お知らせ管理</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">
        <div class="toolbar">
          <button id="add-notice-btn" class="btn-primary">＋ お知らせ追加</button>
        </div>
        <table class="user-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>タイトル</th>
              <th>状態</th>
              <th>作成日</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="notice-list"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modal-title">お知らせ追加</h3>
      <input type="text" id="notice-title" placeholder="タイトル">
      <textarea id="notice-content" placeholder="内容" rows="4"></textarea>
      <div class="modal-buttons">
        <button id="modal-submit" class="btn-primary">保存</button>
        <button id="modal-cancel" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>
  <script src="js/api.js?v=17"></script>
  <script src="js/auth.js?v=17"></script>
  <script src="js/notices.js?v=17"></script>
    <nav class="bottom-nav">
    <a href="home.html"><span>🏠</span><span>ホーム</span></a>
    <a href="board.html"><span>📋</span><span>掲示板</span></a>
    <a href="calendar.html"><span>📅</span><span>カレンダー</span></a>
    <a href="study.html"><span>📚</span><span>学習</span></a>
    <a href="profile.html"><span>👤</span><span>プロフィール</span></a>
  </nav>
</body>
</html>
