<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - お知らせ管理</title>
  <link rel="stylesheet" href="css/style.css">
  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';</script>

  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="page-spinner"><div class="spinner-ring"></div><p class="spinner-text">読み込み中...</p></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="dashboard.html">Polonix</a><span class="sidebar-version">v0.9.6-β</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li><a href="board.html">掲示板</a></li>
          <li><a href="calendar.html">カレンダー</a></li>
          <li><a href="study.html">学習</a></li>
          <li><a href="game.html">Pクエスト</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li><a href="feedback.html">ご意見箱</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
        <button id="pwa-install-btn">📲 アプリをインストール</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
      <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>お知らせ管理</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">
        <div class="toolbar">
          <button id="add-notice-btn" class="btn-primary">＋ お知らせ追加</button>
        </div>
        <table class="user-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>タイトル</th>
              <th>状態</th>
              <th>作成日</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="notice-list"></tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modal-title">お知らせ追加</h3>
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);">
            <input type="checkbox" id="notice-pinned"> 📌 ピン留め
          </label>
          <select id="notice-priority" style="background:var(--bg-sub);color:var(--text-2);border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:12px;">
            <option value="normal">通常</option>
            <option value="important">⚠️ 重要</option>
            <option value="urgent">🚨 緊急</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-2);">
            <input type="checkbox" id="notice-active" checked> 公開
          </label>
        </div>
        <input type="text" id="notice-title" placeholder="タイトル">
      <textarea id="notice-content" placeholder="内容" rows="4"></textarea>
      <div class="modal-buttons">
        <button id="modal-submit" class="btn-primary">保存</button>
        <button id="modal-cancel" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>
  <script src="js/api.js?v=19"></script>
  <script src="js/auth.js?v=19"></script>
  <script src="js/notices.js?v=19"></script>
</body>
</html>
