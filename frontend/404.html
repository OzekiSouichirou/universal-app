<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - ページが見つかりません</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }
    .error-code {
      font-size: 72px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .error-title { font-size: 20px; font-weight: 700; color: var(--text); margin: 0; }
    .error-msg { color: var(--text-2); margin: 0; font-size: 14px; }
    .error-actions { display: flex; gap: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <h2 class="error-title">ページが見つかりません</h2>
    <p class="error-msg">お探しのページは存在しないか、移動した可能性があります。</p>
    <div class="error-actions">
      <button onclick="history.back()" class="btn-secondary">戻る</button>
      <a href="javascript:history.back()" class="btn-secondary" style="text-decoration:none;padding:8px 20px;border-radius:var(--r);">前のページへ</a>
      <a href="home.html" class="btn-primary" style="text-decoration:none;padding:8px 20px;border-radius:var(--r);">ホームへ</a>
    </div>
  </div>
</body>
</html>
