<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b6ef5">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - 学習管理</title>
  <link rel="stylesheet" href="css/style.css">
  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';</script>

  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div id="page-spinner"><div class="spinner-ring"></div><p class="spinner-text">読み込み中...</p></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.9.6-β</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li><a href="board.html">掲示板</a></li>
          <li><a href="calendar.html">カレンダー</a></li>
          <li class="active"><a href="study.html">学習</a></li>
          <li><a href="game.html">発掘</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li><a href="feedback.html">ご意見箱</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
        <button id="pwa-install-btn">アプリをインストール</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>学習</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">

        <div class="study-tabs">
          <button class="study-tab" data-tab="timetable">時間割</button>
          <button class="study-tab active" data-tab="tasks">課題</button>
          <button class="study-tab" data-tab="grades">成績</button>
          <button class="study-tab" data-tab="attendance">出席</button>
        </div>

        <!-- 時間割タブ -->
        <div id="tab-timetable" class="study-tab-content" style="display:none;">
          <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
            <button id="tt-settings-btn" class="btn-secondary" style="padding:6px 12px;font-size:12px;">⚙️ 設定</button>
          </div>
        <!-- 設定パネル -->
        <div id="tt-settings-panel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px;flex-wrap:wrap;align-items:center;gap:24px;">
          <label style="font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:8px;">
            表示時限数
            <select id="tt-periods-select" style="background:var(--bg-sub);color:var(--text);border:1px solid var(--border);border-radius:var(--r);padding:4px 8px;font-size:13px;">
              <option value="4">4限</option>
              <option value="5">5限</option>
              <option value="6" selected>6限</option>
              <option value="7">7限</option>
              <option value="8">8限</option>
              <option value="9">9限</option>
              <option value="10">10限</option>
            </select>
          </label>
          <label style="font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="tt-show-sun"> 日曜日を表示
          </label>
        </div>
        <div class="tt-today-banner" id="tt-today-banner"></div>
        <div class="table-scroll">
          <table class="tt-table" id="tt-table">
            <thead id="tt-thead"></thead>
            <tbody id="tt-body"></tbody>
          </table>
        </div>
        </div>
        <!-- 課題タブ -->
        <div id="tab-tasks" class="study-tab-content">

          <div class="db-card" style="margin-bottom:16px;">
            <div class="db-card-title" style="margin-bottom:2px;">締切カレンダー</div>
            <p style="font-size:12px;color:var(--text-3);margin-bottom:12px;">課題の締切日をカレンダーで確認できます</p>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <button id="cal-prev" class="btn-secondary" style="padding:5px 12px;font-size:13px;">◀</button>
              <span id="cal-label" style="font-size:14px;font-weight:700;color:var(--text)"></span>
              <button id="cal-next" class="btn-secondary" style="padding:5px 12px;font-size:13px;">▶</button>
            </div>
            <div id="task-calendar" class="task-cal-grid"></div>
          </div>

          <div class="db-card" style="margin-bottom:16px;">
            <div class="db-card-title" style="margin-bottom:2px;">課題を追加</div>
            <p style="font-size:12px;color:var(--text-3);margin-bottom:12px;">タイトルと締切日は必須です</p>
            <input type="text" id="task-title" placeholder="課題タイトル" maxlength="100">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
              <input type="text" id="task-subject" placeholder="科目名（任意）" maxlength="50">
              <input type="date" id="task-due">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">
              <select id="task-priority">
                <option value="high">優先度：高</option>
                <option value="medium" selected>優先度：中</option>
                <option value="low">優先度：低</option>
              </select>
              <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);">
                <input type="checkbox" id="task-sync-cal" checked> カレンダーにも登録
              </label>
            </div>
            <input type="text" id="task-memo" placeholder="メモ（任意）" maxlength="100" style="margin-top:10px;">
            <button id="task-add-btn" class="btn-primary" style="margin-top:12px;width:100%;">追加</button>
            <p id="task-msg" style="font-size:13px;min-height:16px;margin-top:6px;"></p>
          </div>

          <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
            <button class="task-filter-btn active" data-status="all">すべて</button>
            <button class="task-filter-btn" data-status="pending">未着手</button>
            <button class="task-filter-btn" data-status="in_progress">進行中</button>
            <button class="task-filter-btn" data-status="done">完了</button>
          </div>
          <div id="tasks-list"></div>
        </div>

        <!-- 成績タブ -->
        <div id="tab-grades" class="study-tab-content" style="display:none;">
          <div class="db-card" style="margin-bottom:16px;">
            <div class="db-card-title" style="margin-bottom:2px;">成績を追加</div>
            <p style="font-size:12px;color:var(--text-3);margin-bottom:12px;">科目名・得点・日付を入力してください</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <input type="text" id="grade-subject" placeholder="科目名" maxlength="50">
              <input type="date" id="grade-date">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;">
              <div>
                <label style="font-size:11px;color:var(--text-3);">得点</label>
                <input type="number" id="grade-score" placeholder="例: 85" min="0" step="0.1">
              </div>
              <div>
                <label style="font-size:11px;color:var(--text-3);">満点</label>
                <input type="number" id="grade-max" placeholder="例: 100" min="1" step="0.1" value="100">
              </div>
              <div>
                <label style="font-size:11px;color:var(--text-3);">種別</label>
                <select id="grade-type">
                  <option value="exam">試験</option>
                  <option value="quiz">小テスト</option>
                  <option value="report">レポート</option>
                  <option value="other">その他</option>
                </select>
              </div>
            </div>
            <input type="text" id="grade-memo" placeholder="メモ（任意）" maxlength="100" style="margin-top:10px;">
            <button id="grade-add-btn" class="btn-primary" style="margin-top:12px;width:100%;">追加</button>
            <p id="grade-msg" style="font-size:13px;min-height:16px;margin-top:6px;"></p>
          </div>
          <div class="db-card" style="margin-bottom:16px;">
            <div class="db-card-title" style="margin-bottom:12px;">科目別平均点</div>
            <canvas id="grades-chart" height="200"></canvas>
            <p id="grades-empty" style="font-size:13px;color:var(--text-3);text-align:center;padding:16px;display:none;">成績を追加するとグラフが表示されます</p>
          </div>
          <div class="db-card">
            <div class="db-card-title" style="margin-bottom:12px;">成績一覧</div>
            <div id="grades-list"></div>
          </div>
        </div>

        <!-- 出席タブ -->
        <div id="tab-attendance" class="study-tab-content" style="display:none;">
          <div class="db-card" style="margin-bottom:16px;">
            <div class="db-card-title" style="margin-bottom:2px;">科目を登録</div>
            <p style="font-size:12px;color:var(--text-3);margin-bottom:12px;">科目ごとに授業数と出席数を管理します。出席ボタンで1回ずつ記録できます。</p>
            <input type="text" id="att-subject" placeholder="科目名" maxlength="50">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;">
              <div>
                <label style="font-size:11px;color:var(--text-3);">総授業数</label>
                <input type="number" id="att-total" min="0" value="0">
              </div>
              <div>
                <label style="font-size:11px;color:var(--text-3);">出席数</label>
                <input type="number" id="att-attended" min="0" value="0">
              </div>
              <div>
                <label style="font-size:11px;color:var(--text-3);">欠席上限</label>
                <input type="number" id="att-max" min="1" value="5">
              </div>
            </div>
            <button id="att-save-btn" class="btn-primary" style="margin-top:12px;width:100%;">保存</button>
            <p id="att-msg" style="font-size:13px;min-height:16px;margin-top:6px;"></p>
          </div>
          <div id="attendance-list"></div>
        </div>

      </section>
    </main>
  </div>

  <!-- 課題編集モーダル -->
  <div id="task-edit-modal" class="modal hidden">
    <div class="modal-box">
      <h3>課題を編集</h3>
      <input type="hidden" id="edit-task-id">
      <input type="text" id="edit-task-title" placeholder="タイトル">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;">
        <input type="text" id="edit-task-subject" placeholder="科目名">
        <input type="date" id="edit-task-due">
      </div>
      <select id="edit-task-priority" style="margin-top:8px;">
        <option value="high">優先度：高</option>
        <option value="medium">優先度：中</option>
        <option value="low">優先度：低</option>
      </select>
      <input type="text" id="edit-task-memo" placeholder="メモ" style="margin-top:8px;">
      <div class="modal-buttons">
        <button id="edit-task-save-btn" class="btn-primary">保存</button>
        <button id="edit-task-cancel-btn" class="btn-secondary">キャンセル</button>
        <button id="edit-task-delete-btn" class="btn-danger">削除</button>
      </div>
    </div>
  </div>

  <!-- 成績編集モーダル -->
  <div id="grade-edit-modal" class="modal hidden">
    <div class="modal-box">
      <h3>成績を編集</h3>
      <input type="hidden" id="edit-grade-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <input type="text" id="edit-grade-subject" placeholder="科目名">
        <input type="date" id="edit-grade-date">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:8px;">
        <input type="number" id="edit-grade-score" placeholder="得点" step="0.1">
        <input type="number" id="edit-grade-max" placeholder="満点" step="0.1">
        <select id="edit-grade-type">
          <option value="exam">試験</option>
          <option value="quiz">小テスト</option>
          <option value="report">レポート</option>
          <option value="other">その他</option>
        </select>
      </div>
      <input type="text" id="edit-grade-memo" placeholder="メモ" style="margin-top:8px;">
      <div class="modal-buttons">
        <button id="edit-grade-save-btn" class="btn-primary">保存</button>
        <button id="edit-grade-cancel-btn" class="btn-secondary">キャンセル</button>
        <button id="edit-grade-delete-btn" class="btn-danger">削除</button>
      </div>
    </div>
  </div>

  <div id="tt-modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="tt-modal-title">授業を登録</h3>
      <input type="text" id="tt-subject" placeholder="科目名（必須）" maxlength="30">
      <input type="time" id="tt-start-time" placeholder="開始時刻" style="color:var(--text);background:var(--bg-sub);border:1px solid var(--border-2);border-radius:var(--r);padding:10px 14px;font-size:14px;width:100%;">
      <input type="text" id="tt-room" placeholder="教室（例：A棟301）" maxlength="20">
      <input type="text" id="tt-teacher" placeholder="教員名" maxlength="20">
      <textarea id="tt-memo" placeholder="メモ" rows="2"></textarea>
      <div class="tt-color-row">
        <span style="font-size:13px;color:var(--text-2);">カラー</span>
        <div class="tt-color-options" id="tt-color-options"></div>
      </div>
      <div class="modal-buttons">
        <button id="tt-save-btn" class="btn-primary">保存</button>
        <button id="tt-cancel-btn" class="btn-secondary">キャンセル</button>
        <button id="tt-delete-btn" class="btn-danger" style="display:none;">削除</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html"><span>ホーム</span></a>
    <a href="board.html"><span>掲示板</span></a>
    <a href="calendar.html"><span>カレンダー</span></a>
    <a href="study.html" class="active"><span>学習</span></a>
    <a href="profile.html"><span>プロフィール</span></a>
  </nav>

  <script src="js/api.js?v=18"></script>
  <script src="js/auth.js?v=18"></script>
  <script src="js/timetable.js?v=18"></script>
  <script src="js/study.js?v=18"></script>
</body>
</html>
