<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - 掲示板</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.5.0-beta</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li class="active"><a href="board.html">掲示板</a></li>
          <li><a href="calendar.html">カレンダー</a></li>
          <li><a href="timetable.html">時間割</a></li>
          <li><a href="game.html">ゲーム関連</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li><a href="feedback.html">ご意見箱</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>掲示板</h2>
        <div class="top-bar-right">
          <div class="notif-wrap">
            <button class="notif-bell" id="notif-bell" aria-label="通知">●<span class="notif-badge" id="notif-badge" style="display:none;"></span></button>
            <div class="notif-panel hidden" id="notif-panel">
              <div class="notif-panel-header">
                <span>通知</span>
              </div>
              <div class="notif-list" id="notif-list"></div>
            </div>
          </div>
          <span id="current-user"></span>
        </div>
      </header>
      <section class="content-area">
        <div class="post-form">
          <textarea id="post-content" placeholder="投稿内容を入力（500文字以内）" maxlength="500"></textarea>
          <div id="image-preview"></div>
          <div class="post-form-footer">
            <span id="char-count">0 / 500</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <button id="image-attach-btn" class="btn-secondary btn-icon" title="画像を添付">+</button>
              <input type="file" id="image-input" accept="image/*" style="display:none;">
              <button id="post-btn" class="btn-primary">投稿する</button>
            </div>
          </div>
          <p id="post-msg"></p>
        </div>
        <div id="post-list"></div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/board.js?v=4"></script>
</body>
</html>
