<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5b6ef5">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - 掲示板</title>
  <link rel="stylesheet" href="css/style.css">
  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';</script>

  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>
  <div id="page-spinner"><div class="spinner-ring"></div><p class="spinner-text">読み込み中...</p></div>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.9.6-β</span></div>
      <nav>
        <ul>
          <li><a href="home.html">ホーム</a></li>
          <li  class="active"><a href="board.html">掲示板</a></li>
          <li><a href="calendar.html">カレンダー</a></li>
          <li><a href="study.html">学習</a></li>
          <li><a href="game.html">Pクエスト</a></li>
          <li><a href="profile.html">プロフィール</a></li>
          <li><a href="feedback.html">ご意見箱</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
        <button id="pwa-install-btn">📲 アプリをインストール</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>掲示板</h2>
        <div class="top-bar-right">
          <div class="notif-wrap">
            <button class="notif-bell" id="notif-bell" aria-label="通知">●<span class="notif-badge" id="notif-badge" style="display:none;"></span></button>
            <div class="notif-panel hidden" id="notif-panel">
              <div class="notif-panel-header">
                <span>通知</span>
              </div>
              <div class="notif-list" id="notif-list"></div>
            </div>
          </div>
          <span id="current-user"></span>
        </div>
      </header>
      <section class="content-area">
        <div class="study-tabs">
          <button class="study-tab active" data-tab="board">掲示板</button>
          <button class="study-tab" data-tab="bookmarks">ブックマーク</button>
        </div>
        <div id="tab-board">
        <div class="post-form">
          <textarea id="post-content" placeholder="投稿内容を入力（500文字以内）" maxlength="500"></textarea>
          <div id="image-preview"></div>
          <div class="post-form-footer">
            <span id="char-count">0 / 500</span>
            <div style="display:flex;gap:8px;align-items:center;">
              <button id="image-attach-btn" class="btn-secondary btn-icon" title="画像を添付">+</button>
              <input type="file" id="image-input" accept="image/*" style="display:none;">
              <select id="post-tag-select" style="background:var(--bg-sub);color:var(--text-2);border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:12px;"><option value="">タグなし</option><option value="数学">数学</option><option value="英語">英語</option><option value="物理">物理</option><option value="化学">化学</option><option value="生物">生物</option><option value="歴史">歴史</option><option value="国語">国語</option><option value="情報">情報</option><option value="体育">体育</option><option value="その他">その他</option></select>
              <button id="post-btn" class="btn-primary">投稿する</button>
            </div>
          </div>
          <p id="post-msg"></p>
        </div>
        <div class="search-bar-wrap" style="margin:12px 0 8px;">
          <div style="position:relative;">
            <input type="text" id="search-input" placeholder="投稿を検索..." maxlength="50"
              style="width:100%;padding:9px 36px 9px 14px;background:var(--surface-2);border:1px solid var(--border);
                     border-radius:var(--r);color:var(--text);font-size:13px;box-sizing:border-box;">
            <button id="search-clear-btn" title="クリア"
              style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
                     background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;display:none;">✕</button>
          </div>
          <p id="search-status" style="font-size:12px;color:var(--text-3);margin:4px 0 0 2px;"></p>
        </div>
        <div id="post-list"></div>
        </div><!-- /tab-board -->
        <div id="tab-bookmarks" style="display:none;">
          <div id="bookmark-list"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="js/api.js?v=19"></script>
  <script src="js/auth.js?v=19"></script>
  <script src="js/board.js?v=19"></script>
  <script src="js/bookmarks.js?v=19"></script>
  <nav class="bottom-nav">
    <a href="home.html"><span>ホーム</span></a>
    <a href="board.html" class="active"><span>掲示板</span></a>
    <a href="calendar.html"><span>カレンダー</span></a>
    <a href="study.html"><span>学習</span></a>
    <a href="profile.html"><span>プロフィール</span></a>
  </nav>
  <script>
document.addEventListener('DOMContentLoaded', () => {
  let _bmLoaded = false;
  document.querySelectorAll('.study-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.study-tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#tab-board, #tab-bookmarks').forEach(c => c.style.display = 'none');
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
      if (btn.dataset.tab === 'bookmarks' && !_bmLoaded) {
        _bmLoaded = true;
        bmInit();
      }
    });
  });
});
  </script>
</body>
</html>
