<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - ホーム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="home.html">Polonix</a><span class="sidebar-version">v0.3.0-beta</span></div>
      <nav>
        <ul>
          <li class="active"><a href="home.html">ホーム</a></li>
          <li><a href="board.html">掲示板</a></li>
          <li><a href="profile.html">プロフィール</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
      <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>ホーム</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area">
        <div class="welcome-box">
          <h3 id="welcome-msg">ようこそ</h3>
          <p>Polonix へログインしました。</p>
        </div>
        <div class="notice-area">
          <h4>お知らせ</h4>
          <ul id="notice-list">
            <li class="notice-item">現在お知らせはありません</li>
          </ul>
        </div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
