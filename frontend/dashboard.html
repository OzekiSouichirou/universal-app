<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - ダッシュボード</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="dashboard.html">Polonix</a><span class="sidebar-version">v0.3.0-beta</span></div>
      <nav>
        <ul>
          <li class="active"><a href="dashboard.html">ダッシュボード</a></li>
          <li><a href="users.html">ユーザー管理</a></li>
          <li><a href="notices.html">お知らせ管理</a></li>
          <li><a href="logs.html">ログ確認</a></li>
          <li><a href="admin-settings.html">設定</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
      <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>ダッシュボード</h2>
        <span id="current-user">管理者</span>
      </header>
      <section class="cards">
        <div class="card">
          <p>総ユーザー数</p>
          <h3 id="total-users">---</h3>
        </div>
        <div class="card">
          <p>管理者数</p>
          <h3 id="total-admins">---</h3>
        </div>
        <div class="card">
          <p>一般ユーザー数</p>
          <h3 id="total-members">---</h3>
        </div>
      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
