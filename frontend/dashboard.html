<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polonix - ダッシュボード</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title"><a href="dashboard.html">Polonix</a><span class="sidebar-version">v0.8.0-β</span></div>
              <nav>
        <ul>
          <li class="active"><a href="dashboard.html">ダッシュボード</a></li>
          <li><a href="users.html">ユーザー管理</a></li>
          <li><a href="notices.html">お知らせ管理</a></li>
          <li><a href="logs.html">ログ確認</a></li>
          <li><a href="feedback-admin.html">ご意見箱</a></li>
          <li><a href="xp-admin.html">XP管理</a></li>
          <li><a href="admin-settings.html">設定</a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn">ログアウト</button>
      </div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <button class="hamburger" id="hamburger-btn" aria-label="メニュー">☰</button>
        <h2>ダッシュボード</h2>
        <span id="current-user"></span>
      </header>
      <section class="content-area db-layout">

        <div class="db-stat-row" id="stat-cards"></div>

        <div class="db-grid">
          <div class="db-card db-card-wide">
            <div class="db-card-title">📈 投稿数推移（過去7日）</div>
            <canvas id="chart-trend" height="120"></canvas>
          </div>
          <div class="db-card">
            <div class="db-card-title">🏆 XPランキング</div>
            <canvas id="chart-xp" height="180"></canvas>
          </div>
          <div class="db-card admin-only" id="hourly-card">
            <div class="db-card-title">🕐 時間帯別投稿数</div>
            <canvas id="chart-hourly" height="180"></canvas>
          </div>
          <div class="db-card">
            <div class="db-card-title">📅 今日の予定</div>
            <div id="db-today-events" class="db-list"></div>
          </div>
          <div class="db-card">
            <div class="db-card-title">📚 今日の時間割</div>
            <div id="db-today-tt" class="db-list"></div>
          </div>
          <div class="db-card">
            <div class="db-card-title">⚡ サーバー状態</div>
            <div id="db-server" class="db-server-box">
              <span id="db-server-dot" class="server-dot"></span>
              <span id="db-server-label">確認中...</span>
              <span id="db-server-ms" class="server-ms"></span>
            </div>
          </div>
        </div>

      </section>
    </main>
  </div>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js?v=2"></script>
</body>
</html>
