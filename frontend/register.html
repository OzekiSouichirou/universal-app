<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <h1>汎用アプリ</h1>
      <p>新規アカウント登録</p>
      <input type="text" id="username" placeholder="ユーザー名（3文字以上）">
      <input type="password" id="password" placeholder="パスワード（6文字以上）">
      <input type="password" id="confirm-password" placeholder="パスワード（確認）">
      <button id="register-btn">登録する</button>
      <p id="error-msg"></p>
      <p class="login-link">アカウントをお持ちの方は <a href="index.html">ログイン</a></p>
    </div>
  </div>
  <script src="js/register.js"></script>
</body>
</html>
